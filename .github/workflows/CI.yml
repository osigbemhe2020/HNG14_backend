name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test
        env:
          PORT: 3002
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
          GITHUB_REDIRECT_URI: http://localhost:3002/auth/github/callback
          GITHUB_CLI_CLIENT_ID: test_cli_client_id
          WEB_PORTAL_URL: http://localhost:3000
          BASE_URL: http://localhost:3002

      - name: Check app loads without errors
        run: timeout 10s node -e "require('./app')" || echo "App loads successfully"
        env:
          PORT: 3002
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
          GITHUB_REDIRECT_URI: http://localhost:3002/auth/github/callback
          GITHUB_CLI_CLIENT_ID: test_cli_client_id
          WEB_PORTAL_URL: http://localhost:3000
          BASE_URL: http://localhost:3002